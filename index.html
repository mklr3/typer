<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Automatyczny Typer MŚ 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1a3a5f; --secondary: #0b7285; --success: #2b8a3e; --warning: #fab005; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; font-size: 2rem; }
        .subtitle { text-align: center; color: #666; margin-bottom: 20px; }
        .leaderboard { position: sticky; top: 10px; z-index: 100; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; justify-content: space-around; margin-bottom: 20px; border: 2px solid var(--primary); }
        .player-score { font-weight: bold; text-align: center; font-size: 1.1rem; flex: 1; }
        .player-score span { display: block; font-size: 1.8rem; color: var(--secondary); margin-top: 5px; }
        .nav-tabs, .filter-tabs { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 15px; }
        .tab-btn { padding: 8px 16px; background: #e9ecef; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .match-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 12px; border-left: 5px solid #dee2e6; }
        .match-main { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .team-name { flex: 1; font-weight: bold; font-size: 1.05rem; }
        .team-left { text-align: right; padding-right: 15px; }
        .team-right { text-align: left; padding-left: 15px; }
        .score-inputs { display: flex; align-items: center; gap: 5px; background: #e3fafc; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--secondary); font-weight: bold; color: var(--secondary); }
        input[type="number"] { width: 35px; height: 30px; text-align: center; font-size: 1.1rem; font-weight: bold; border: 1px solid #ced4da; border-radius: 4px; }
        .typer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #f1f3f5; padding: 8px; border-radius: 6px; font-size: 0.9rem; }
        .typer-col { display: flex; flex-direction: column; align-items: center; gap: 3px; background: white; padding: 5px; border-radius: 4px; border: 1px solid #e9ecef; }
        .typer-name { font-weight: 600; color: #495057; font-size: 0.85rem; }
        .typer-inputs { display: flex; align-items: center; gap: 2px; }
        .pts-badge { font-size: 0.75rem; font-weight: bold; padding: 2px 6px; border-radius: 3px; color: white; background: #6c757d; margin-top: 2px; }
        .pts-3 { background: var(--success); }
        .pts-2 { background: #1098ad; }
        .pts-1 { background: var(--warning); color: #333; }
        .actions { text-align: center; margin: 20px 0; position: sticky; bottom: 10px; display: flex; justify-content: center; gap: 10px; }
        .btn-save { padding: 12px 30px; background: var(--success); color: white; border: none; border-radius: 8px; font-size: 1.2rem; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-api { padding: 12px 20px; background: var(--secondary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 AUTOMATYCZNY TYPER MŚ 2026 🏆</h1>
    <p class="subtitle">Wiktoria, Janek i Miłosz — Wyniki pobierają się same z bazy FIFA live!</p>

    <div class="leaderboard">
        <div class="player-score">💃 Wiktoria<span id="score-p1">0</span></div>
        <div class="player-score">⚽ Janek<span id="score-p2">0</span></div>
        <div class="player-score">🔥 Miłosz<span id="score-p3">0</span></div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active">Mecze Turnieju</button>
    </div>

    <div id="matches-container"></div>

    <div class="actions">
        <button class="btn-api" onclick="fetchLiveResults()">🔄 POBIERZ WYNIKI LIVE</button>
        <button class="btn-save" onclick="saveDataToCloud()">💾 ZAPISZ MOJE TYPY</button>
    </div>
</div>

<script>
    // Mapowanie Waszych meczów na ID z systemu FIFA
    const matches = [
        { id: 1, apiId: 450001, date: '11.06', teamA: 'Meksyk', teamB: 'RPA' },
        { id: 2, apiId: 450002, date: '12.06', teamA: 'Korea Płd.', teamB: 'Czechy' },
        { id: 3, apiId: 450003, date: '12.06', teamA: 'Kanada', teamB: 'Bośnia i Herc.' }
    ];

    // --- TWOJE ZWERYFIKOWANE I POPRAWIONE KLUCZE ---
    const SUPABASE_URL = "https://vmewefwvqxjyrqdnxntd.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZtZXdlZnd2cXhqeXJxZG54bnRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMTE2MTUsImV4cCI6MjA5NjY4NzYxNX0.qqwQowaI7JEcMpHSWTKFXL5kPcyiBWKLqeGvriUBMVA";
    const FOOTBALL_API_TOKEN = "c022840d3dee415784ddc5de74a16f44";

    // Bezpośrednie i bezpieczne połączenie z bazą danych
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function buildMatches() {
        const container = document.getElementById('matches-container');
        container.innerHTML = '';
        matches.forEach(m => {
            const card = document.createElement('div');
            card.className = 'match-card';
            card.innerHTML = `
                <div class="match-main">
                    <div class="team-name team-left">${m.teamA}</div>
                    <div class="score-inputs">
                        <span id="rA_${m.id}">-</span>
                        <span>:</span>
                        <span id="rB_${m.id}">-</span>
                    </div>
                    <div class="team-name team-right">${m.teamB}</div>
                </div>
                <div class="typer-grid">
                    <div class="typer-col">
                        <span class="typer-name">💃 Wiktoria</span>
                        <div class="typer-inputs">
                            <input type="number" min="0" id="p1A_${m.id}" onchange="calculatePoints()"> :
                            <input type="number" min="0" id="p1B_${m.id}" onchange="calculatePoints()">
                        </div>
                        <span class="pts-badge" id="pts1_${m.id}">0 pkt</span>
                    </div>
                    <div class="typer-col">
                        <span class="typer-name">⚽ Janek</span>
                        <div class="typer-inputs">
                            <input type="number" min="0" id="p2A_${m.id}" onchange="calculatePoints()"> :
                            <input type="number" min="0" id="p2B_${m.id}" onchange="calculatePoints()">
                        </div>
                        <span class="pts-badge" id="pts2_${m.id}">0 pkt</span>
                    </div>
                    <div class="typer-col">
                        <span class="typer-name">🔥 Miłosz</span>
                        <div class="typer-inputs">
                            <input type="number" min="0" id="p3A_${m.id}" onchange="calculatePoints()"> :
                            <input type="number" min="0" id="p3B_${m.id}" onchange="calculatePoints()">
                        </div>
                        <span class="pts-badge" id="pts3_${m.id}">0 pkt</span>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Funkcja pobierająca wyniki LIVE z oficjalnego API sportowego
    async function fetchLiveResults() {
        try {
            const response = await fetch('https://api.football-data.org/v4/competitions/WC/matches', {
                headers: { 'X-Auth-Token': FOOTBALL_API_TOKEN }
            });
            const data = await response.json();
            
            matches.forEach(m => {
                const apiMatch = data.matches.find(x => x.id === m.apiId || (x.homeTeam.name && x.homeTeam.name.toLowerCase().includes(m.teamA.toLowerCase())));
                if(apiMatch && apiMatch.score.fullTime.home !== null) {
                    document.getElementById(`rA_${m.id}`).innerText = apiMatch.score.fullTime.home;
                    document.getElementById(`rB_${m.id}`).innerText = apiMatch.score.fullTime.away;
                    
                    saveScoreToCloud(`rA_${m.id}`, apiMatch.score.fullTime.home);
                    saveScoreToCloud(`rB_${m.id}`, apiMatch.score.fullTime.away);
                }
            });
            calculatePoints();
            alert("Wyniki na żywo zaktualizowane pomyślnie!");
        } catch (err) {
            console.error(err);
            alert("Błąd pobierania wyników live. Sprawdź połączenie.");
        }
    }

    function getPoints(pA, pB, rA, rB) {
        if (pA === "" || pB === "" || rA === "-" || rB === "-") return 0;
        const predA = parseInt(pA), predB = parseInt(pB);
        const realA = parseInt(rA), realB = parseInt(rB);
        if (predA === realA && predB === realB) return 3;
        if (Math.sign(predA - predB) === Math.sign(realA - realB)) return 2;
        if (predA === realA || predB === realB) return 1;
        return 0;
    }

    function calculatePoints() {
        let t1 = 0, t2 = 0, t3 = 0;
        matches.forEach(m => {
            const elRA = document.getElementById(`rA_${m.id}`);
            const elRB = document.getElementById(`rB_${m.id}`);
            const rA = elRA ? elRA.innerText : "-";
            const rB = elRB ? elRB.innerText : "-";
            
            for (let p = 1; p <= 3; p++) {
                const elPA = document.getElementById(`p${p}A_${m.id}`);
                const elPB = document.getElementById(`p${p}B_${m.id}`);
                const pA = elPA ? elPA.value : "";
                const pB = elPB ? elPB.value : "";
                
                const pts = getPoints(pA, pB, rA, rB);
                const b = document.getElementById(`pts${p}_${m.id}`);
                if(b) { b.innerText = `${pts} pkt`; b.className = `pts-badge pts-${pts}`; }
                if(p===1) t1+=pts; if(p===2) t2+=pts; if(p===3) t3+=pts;
            }
        });
        document.getElementById('score-p1').innerText = t1;
        document.getElementById('score-p2').innerText = t2;
        document.getElementById('score-p3').innerText = t3;
    }

    async function saveScoreToCloud(id, value) {
        if(!supabase) return;
        await supabase.from('typer_scores').upsert({ id: id, value: String(value) });
    }

    async function saveDataToCloud() {
        if(!supabase) { alert("Brak połączenia z bazą danych!"); return; }
        const rows = [];
        matches.forEach(m => {
            ['p1A','p1B','p2A','p2B','p3A','p3B'].forEach(k => {
                const el = document.getElementById(`${k}_${m.id}`);
                const val = el ? el.value : "";
                if(val !== "") rows.push({ id: `${k}_${m.id}`, value: val });
            });
        });
        const { error } = await supabase.from('typer_scores').upsert(rows);
        if(error) alert("Błąd zapisu: " + error.message);
        else alert("🎯 Wasze typy zostały trwale zapisane w chmurze Supabase!");
    }

    async function loadDataFromCloud() {
        if(!supabase) return;
        const { data } = await supabase.from('typer_scores').select('*');
        if(!data) return;
        data.forEach(row => {
            const elInput = document.getElementById(row.id);
            const elSpan = document.getElementById(row.id);
            if(elInput && elInput.tagName === "INPUT") elInput.value = row.value;
            else if(elSpan) elSpan.innerText = row.value;
        });
        calculatePoints();
    }

    buildMatches();
    loadDataFromCloud();
</script>
</body>
</html>
