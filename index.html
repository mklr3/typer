        .subtitle { text-align: center; color: #666; margin-bottom: 20px; }
        .leaderboard { position: sticky; top: 10px; z-index: 100; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; justify-content: space-around; margin-bottom: 20px; border: 2px solid var(--primary); }
        .player-score { font-weight: bold; text-align: center; font-size: 1.1rem; flex: 1; }
        .player-score span { display: block; font-size: 1.8rem; color: var(--secondary); margin-top: 5px; }
        .nav-tabs, .filter-tabs { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 15px; }
        .tab-btn { padding: 8px 16px; background: #e9ecef; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .filter-btn { padding: 5px 10px; background: white; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 0.9rem; margin: 2px; }
        .filter-btn.active { background: var(--secondary); color: white; border-color: var(--secondary); }
        .match-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 12px; border-left: 5px solid #dee2e6; }
        .match-card.pucharowa { border-left-color: var(--warning); }
        .match-header { display: flex; justify-content: space-between; font-size: 0.85rem; color: #777; margin-bottom: 8px; font-weight: 500; }
        .match-main { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .team-name { flex: 1; font-weight: bold; font-size: 1.05rem; }
        .team-left { text-align: right; padding-right: 15px; }
        .team-right { text-align: left; padding-left: 15px; }
        .score-inputs { display: flex; align-items: center; gap: 5px; background: #e3fafc; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--secondary); font-weight: bold; color: var(--secondary); }
        input[type="number"] { width: 35px; height: 30px; text-align: center; font-size: 1.1rem; font-weight: bold; border: 1px solid #ced4da; border-radius: 4px; }
        .typer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #f1f3f5; padding: 8px; border-radius: 6px; font-size: 0.9rem; }
        .typer-col { display: flex; flex-direction: column; align-items: center; gap: 3px; background: white; padding: 5px; border-radius: 4px; border: 1px solid #e9ecef; }
        .typer-name { font-weight: 600; color: #495057; font-size: 0.85rem; }
        .typer-inputs { display: flex; align-items: center; gap: 2px; }
        .pts-badge { font-size: 0.75rem; font-weight: bold; padding: 2px 6px; border-radius: 3px; color: white; background: #6c757d; margin-top: 2px; }
        .pts-3 { background: var(--success); }
        .pts-2 { background: #1098ad; }
        .pts-1 { background: var(--warning); color: #333; }
        .actions { text-align: center; margin: 20px 0; position: sticky; bottom: 10px; display: flex; justify-content: center; gap: 10px; z-index: 99; flex-wrap: wrap;}
        .btn-save { padding: 12px 20px; background: var(--success); color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-api { padding: 12px 20px; background: var(--secondary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        .btn-magic { padding: 12px 20px; background: #8e44ad; color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        .admin-toggle { text-align: center; margin-bottom: 10px; }
        .admin-toggle button { background: none; border: none; color: #bbb; cursor: pointer; font-size: 0.8rem; text-decoration: underline; }
    </style>
</head>

            let rA = appData[`rA_${m.id}`] || "-";
            let rB = appData[`rB_${m.id}`] || "-";
            let p1A = appData[`p1A_${m.id}`] || "";
            let p1B = appData[`p1B_${m.id}`] || "";
            let p2A = appData[`p2A_${m.id}`] || "";
            let p2B = appData[`p2B_${m.id}`] || "";
            let p3A = appData[`p3A_${m.id}`] || "";
            let p3B = appData[`p3B_${m.id}`] || "";

            let teamASection = `<span id="nameA_${m.id}">${nazwaA}</span>`;
            let teamBSection = `<span id="nameB_${m.id}">${nazwaB}</span>`;
            let sekcjaWyniku = `<span id="rA_${m.id}">${rA}</span><span>:</span><span id="rB_${m.id}">${rB}</span>`;

            if (adminMode) {
                teamASection = `<input type="text" value="${nazwaA}" onchange="cacheLocal('nameA_${m.id}', this.value); saveAdminDirect('nameA_${m.id}', this.value)" style="width: 80%; border: 1px dashed var(--warning); border-radius: 4px; padding: 4px; font-weight: bold; text-align: center;">`;
                teamBSection = `<input type="text" value="${nazwaB}" onchange="cacheLocal('nameB_${m.id}', this.value); saveAdminDirect('nameB_${m.id}', this.value)" style="width: 80%; border: 1px dashed var(--warning); border-radius: 4px; padding: 4px; font-weight: bold; text-align: center;">`;
                
                sekcjaWyniku = `
                    <input type="number" min="0" value="${rA !== '-' ? rA : ''}" onchange="cacheLocal('rA_${m.id}', this.value); saveAdminDirect('rA_${m.id}', this.value)" style="width:35px; border-color:var(--warning);">
                    <span>:</span>
                    <input type="number" min="0" value="${rB !== '-' ? rB : ''}" onchange="cacheLocal('rB_${m.id}', this.value); saveAdminDirect('rB_${m.id}', this.value)" style="width:35px; border-color:var(--warning);">
                `;
            }

            card.innerHTML = `
                <div class="match-header">
                    <span>${infoGrupa} (Mecz #${m.id})</span>
                    <span>📅 ${m.date}</span>
                </div>
                <div class="match-main">
                    <div class="team-name team-left">${teamASection}</div>
                    <div class="score-inputs">
                        ${sekcjaWyniku}
                    </div>
                    <div class="team-name team-right">${teamBSection}</div>
                </div>
                <div class="typer-grid">
                    <div class="typer-col">
                        <span class="typer-name">💃 Wiktoria</span>
                        <div class="typer-inputs">
                            <input type="number" min="0" id="p1A_${m.id}" value="${p1A}" onchange="cacheLocal('p1A_${m.id}', this.value)"> :
                            <input type="number" min="0" id="p1B_${m.id}" value="${p1B}" onchange="cacheLocal('p1B_${m.id}', this.value)">
                        </div>
                        <span class="pts-badge" id="pts1_${m.id}">0 pkt</span>
                    </div>
                    <div class="typer-col">
                        <span class="typer-name">⚽ Janek</span>
                        <div class="typer-inputs">
                            <input type="number" min="0" id="p2A_${m.id}" value="${p2A}" onchange="cacheLocal('p2A_${m.id}', this.value)"> :
                            <input type="number" min="0" id="p2B_${m.id}" value="${p2B}" onchange="cacheLocal('p2B_${m.id}', this.value)">
                        </div>
                        <span class="pts-badge" id="pts2_${m.id}">0 pkt</span>
                    </div>
                    <div class="typer-col">
                        <span class="typer-name">🔥 Miłosz</span>
                        <div class="typer-inputs">
                            <input type="number" min="0" id="p3A_${m.id}" value="${p3A}" onchange="cacheLocal('p3A_${m.id}', this.value)"> :
                            <input type="number" min="0" id="p3B_${m.id}" value="${p3B}" onchange="cacheLocal('p3B_${m.id}', this.value)">
                        </div>
                        <span class="pts-badge" id="pts3_${m.id}">0 pkt</span>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
        
        calculatePoints();
    }

    function cacheLocal(key, value) {
        appData[key] = value;
        calculatePoints();
    }

    async function saveAdminDirect(id, value) {
        if(!supabaseClient) return;
        await supabaseClient.from('typer_scores').upsert({ id: id, value: String(value) });
    }

    // FUNKCJA POMOCNICZA DLA DRABINKI: Sprawdza, kto zagra dalej
    function getKnockoutResult(matchId, type) {
        let rA = appData[`rA_${matchId}`];
        let rB = appData[`rB_${matchId}`];
        if (rA === undefined || rB === undefined || rA === "-" || rB === "-" || rA === "" || rB === "") return null;
        
        let scoreA = parseInt(rA);
        let scoreB = parseInt(rB);
        
        let refMatch = matches.find(x => x.id === matchId);
        if (!refMatch) return null;

        let teamA = appData[`nameA_${matchId}`] || refMatch.teamA;
        let teamB = appData[`nameB_${matchId}`] || refMatch.teamB;

        // Jeśli mecz fazy pucharowej zakończy się remisem (karne), system nie podejmie decyzji - wynik wpiszesz ręcznie w Trybie Pilota
        if (scoreA > scoreB) return type === 'winner' ? teamA : teamB;
        if (scoreB > scoreA) return type === 'winner' ? teamB : teamA;
        
        return null;
    }

    // MAGICZNA FUNKCJA DRABINKI
    async function autoResolveBracket() {
        if(!supabaseClient) { alert("Brak połączenia z bazą!"); return; }
        
        let updates = [];
        let changed = false;

        // Rozstrzyganie drabinki - pcha drużyny od 1/8 do samego finału
        matches.filter(m => m.phase === 'pucharowa' && m.id > 88).forEach(m => {
            // Analiza Drużyny A
            if (m.teamA.startsWith('Zwycięzca M')) {
                let refId = parseInt(m.teamA.replace('Zwycięzca M', ''));
                let winner = getKnockoutResult(refId, 'winner');
                if (winner && appData[`nameA_${m.id}`] !== winner) {
                    appData[`nameA_${m.id}`] = winner;
                    updates.push({ id: `nameA_${m.id}`, value: winner });
                    changed = true;
                }
            } else if (m.teamA.startsWith('Przegrany M')) {
                let refId = parseInt(m.teamA.replace('Przegrany M', ''));
                let loser = getKnockoutResult(refId, 'loser');
                if (loser && appData[`nameA_${m.id}`] !== loser) {
                    appData[`nameA_${m.id}`] = loser;
                    updates.push({ id: `nameA_${m.id}`, value: loser });
                    changed = true;
                }
            }

            // Analiza Drużyny B
            if (m.teamB.startsWith('Zwycięzca M')) {
                let refId = parseInt(m.teamB.replace('Zwycięzca M', ''));
                let winner = getKnockoutResult(refId, 'winner');
                if (winner && appData[`nameB_${m.id}`] !== winner) {
                    appData[`nameB_${m.id}`] = winner;
                    updates.push({ id: `nameB_${m.id}`, value: winner });
                    changed = true;
                }
            } else if (m.teamB.startsWith('Przegrany M')) {
                let refId = parseInt(m.teamB.replace('Przegrany M', ''));
                let loser = getKnockoutResult(refId, 'loser');
                if (loser && appData[`nameB_${m.id}`] !== loser) {
                    appData[`nameB_${m.id}`] = loser;
                    updates.push({ id: `nameB_${m.id}`, value: loser });
                    changed = true;
                }
            }
        });

        if (changed && updates.length > 0) {
            const { error } = await supabaseClient.from('typer_scores').upsert(updates);
            if(error) {
                alert("Błąd podczas przesuwania drużyn w chmurze: " + error.message);
            } else {
                buildMatches();
                alert("🪄 Magia! Zwycięzcy awansowali w drabince pucharowej!");
            }
        } else {
            alert("Brak nowych, rozstrzygniętych spotkań. System nie ma kogo przepchnąć dalej.");
        }
    }

    async function fetchLiveResults() {
        try {
            const proxyUrl = "https://api.allorigins.win/get?url=";
            const targetUrl = encodeURIComponent('https://api.football-data.org/v4/competitions/WC/matches');
            
            const response = await fetch(proxyUrl + targetUrl);
            const wrapper = await response.json();
            const data = JSON.parse(wrapper.contents);
            
            if(!data.matches) return;
            
            let changed = false;
            matches.forEach(m => {
                const currentName = appData[`nameA_${m.id}`] || m.teamA;
                const apiMatch = data.matches.find(x => x.homeTeam.name && x.homeTeam.name.toLowerCase().includes(currentName.toLowerCase()));
                if(apiMatch && apiMatch.score.fullTime.home !== null) {
                    const hScore = apiMatch.score.fullTime.home;
                    const aScore = apiMatch.score.fullTime.away;
                    
                    appData[`rA_${m.id}`] = hScore;
                    appData[`rB_${m.id}`] = aScore;
                    changed = true;
                    
                    saveAdminDirect(`rA_${m.id}`, hScore);
                    saveAdminDirect(`rB_${m.id}`, aScore);
                }
            });
            if(changed) {
                buildMatches();
                alert("Wyniki na żywo zaktualizowane pomyślnie!");
            } else {
                alert("Połączenie udane. Brak nowych rozstrzygniętych meczów w bazie FIFA.");
            }
        } catch (err) {
            console.error(err);
            alert("Błąd pobierania wyników live z FIFA. Spróbuj ponownie za chwilę.");
        }
    }

    // PUNKTY: Reguła 3 - 1
    function getPoints(pA, pB, rA, rB) {
        if (pA === "" || pB === "" || rA === "-" || rB === "-") return 0;
        const predA = parseInt(pA), predB = parseInt(pB);
        const realA = parseInt(rA), realB = parseInt(rB);
        
        // 1. Dokładny wynik -> 3 pkt
        if (predA === realA && predB === realB) return 3;
        
        const signPred = Math.sign(predA - predB);
        const signReal = Math.sign(realA - realB);
        
        // 2. Rozstrzygnięcie (kto wygrał lub remis) -> 1 pkt
        if (signPred === signReal) {
            return 1;
        }
        
        return 0;
    }

    function calculatePoints() {
        let t1 = 0, t2 = 0, t3 = 0;
        matches.forEach(m => {
            let rA = appData[`rA_${m.id}`] || "-";
            let rB = appData[`rB_${m.id}`] || "-";
            
            for (let p = 1; p <= 3; p++) {
                const pA = appData[`p${p}A_${m.id}`] || "";
                const pB = appData[`p${p}B_${m.id}`] || "";
                
                const pts = getPoints(pA, pB, rA, rB);
                const b = document.getElementById(`pts${p}_${m.id}`);
                if(b) { 
                    b.innerText = `${pts} pkt`; 
                    b.className = `pts-badge pts-${pts === 3 ? 3 : (pts === 2 ? 2 : (pts === 1 ? 1 : 0))}`; 
                }
                if(p===1) t1+=pts; if(p===2) t2+=pts; if(p===3) t3+=pts;
            }
        });
        document.getElementById('score-p1').innerText = t1;
        document.getElementById('score-p2').innerText = t2;
        document.getElementById('score-p3').innerText = t3;
    }

    async function saveDataToCloud() {
        if(!supabaseClient) { alert("Brak połączenia z chmurą!"); return; }
        
        const rows = [];
        matches.forEach(m => {
            ['p1A','p1B','p2A','p2B','p3A','p3B'].forEach(k => {
                const key = `${k}_${m.id}`;
                const val = appData[key];
                if(val !== undefined && val !== "") {
                    rows.push({ id: key, value: String(val) });
                }
            });
        });

        if(rows.length === 0) {
            alert("Nie masz żadnych wpisanych wyników do zapisania.");
            return;
        }

        const { error } = await supabaseClient.from('typer_scores').upsert(rows);
        if(error) alert("Błąd zapisu: " + error.message);
        else alert("🎯 Wasze typy zostały zapisane na amen!");
    }

    async function loadDataFromCloud() {
        if(!supabaseClient) return;
        const { data } = await supabaseClient.from('typer_scores').select('*');
        if(!data) return;
        
        data.forEach(row => {
            appData[row.id] = row.value;
        });
        
        buildMatches();
    }

    function switchPhase(phase) {
        currentPhase = phase;
        document.querySelectorAll('.nav-tabs .tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-phase-${phase}`).classList.add('active');
        
        document.getElementById('group-filters').style.display = phase === 'grupowa' ? 'flex' : 'none';
        document.getElementById('date-filters').style.display = phase === 'timeline' ? 'flex' : 'none';
        
        buildMatches();
    }

    function filterGroup(group) {
        currentGroupFilter = group;
        document.querySelectorAll('#group-filters .filter-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-group-${group}`).classList.add('active');
        buildMatches();
    }

    function filterDate(date) {
        currentDateFilter = date;
        document.querySelectorAll('#date-filters .filter-btn').forEach(b => b.classList.remove('active'));
        const cssId = date === 'ALL' ? 'ALL' : date.replace(/[\.\s\(\)\/]/g, '-');
        document.getElementById(`btn-date-${cssId}`).classList.add('active');
        buildMatches();
    }

    window.addEventListener('DOMContentLoaded', () => {
        try {
            if (window.supabase && typeof window.supabase.createClient === 'function') {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch (err) {
            console.error("Błąd połączenia z Supabase:", err);
        }
        buildDateFilters();
        loadDataFromCloud();
    });
</script>
