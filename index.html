    <style>
        :root { --primary: #1a3a5f; --secondary: #0b7285; --success: #2b8a3e; --warning: #fab005; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; font-size: 2rem; }
        .subtitle { text-align: center; color: #666; margin-bottom: 20px; }
        .leaderboard { position: sticky; top: 10px; z-index: 100; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; justify-content: space-around; margin-bottom: 20px; border: 2px solid var(--primary); }
        .player-score { font-weight: bold; text-align: center; font-size: 1.1rem; flex: 1; }
        .player-score span { display: block; font-size: 1.8rem; color: var(--secondary); margin-top: 5px; }
        .nav-tabs, .filter-tabs { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 15px; }
        .tab-btn { padding: 8px 16px; background: #e9ecef; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .filter-btn { padding: 5px 10px; background: white; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 0.9rem; margin: 2px; }
        .filter-btn.active { background: var(--secondary); color: white; border-color: var(--secondary); }
        .match-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 12px; border-left: 5px solid #dee2e6; }
        .match-card.pucharowa { border-left-color: var(--warning); }
        .match-header { display: flex; justify-content: space-between; font-size: 0.85rem; color: #777; margin-bottom: 8px; font-weight: 500; }
        .match-main { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .team-name { flex: 1; font-weight: bold; font-size: 1.05rem; }
        .team-left { text-align: right; padding-right: 15px; }
        .team-right { text-align: left; padding-left: 15px; }
        .team-name input { font-size: 1rem; font-weight: bold; padding: 4px; width: 80%; border: 1px dashed var(--warning); border-radius: 4px; }
        .team-left input { text-align: right; }
        .team-right input { text-align: left; }
        .score-inputs { display: flex; align-items: center; gap: 5px; background: #e3fafc; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--secondary); font-weight: bold; color: var(--secondary); }
        .score-inputs input { width: 30px; height: 25px; text-align: center; font-weight: bold; border: 1px solid var(--secondary); border-radius: 4px; }
        input[type="number"] { width: 35px; height: 30px; text-align: center; font-size: 1.1rem; font-weight: bold; border: 1px solid #ced4da; border-radius: 4px; }
        .typer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #f1f3f5; padding: 8px; border-radius: 6px; font-size: 0.9rem; }
        .typer-col { display: flex; flex-direction: column; align-items: center; gap: 3px; background: white; padding: 5px; border-radius: 4px; border: 1px solid #e9ecef; }
        .typer-name { font-weight: 600; color: #495057; font-size: 0.85rem; }
        .typer-inputs { display: flex; align-items: center; gap: 2px; }
        .pts-badge { font-size: 0.75rem; font-weight: bold; padding: 2px 6px; border-radius: 3px; color: white; background: #6c757d; margin-top: 2px; }
        .pts-3 { background: var(--success); }
        .pts-2 { background: #1098ad; }
        .pts-1 { background: var(--warning); color: #333; }
        .actions { text-align: center; margin: 20px 0; position: sticky; bottom: 10px; display: flex; justify-content: center; gap: 10px; z-index: 99; }
        .btn-save { padding: 12px 30px; background: var(--success); color: white; border: none; border-radius: 8px; font-size: 1.2rem; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-api { padding: 12px 20px; background: var(--secondary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        .admin-toggle { text-align: center; margin-bottom: 10px; }
        .admin-toggle button { background: none; border: none; color: #bbb; cursor: pointer; font-size: 0.8rem; text-decoration: underline; }
    </style>
</head>

    function toggleAdminMode() {
        adminMode = !adminMode;
        buildMatches();
    }

    function buildDateFilters() {
        const dateContainer = document.getElementById('date-filters');
        const unikalneDaty = [...new Set(matches.map(m => m.date))].sort((a, b) => {
            const [dzienA, miesiacA] = a.split('.').map(Number);
            const [dzienB, miesiacB] = b.split('.').map(Number);
            return miesiacA === miesiacB ? dzienA - dzienB : miesiacA - miesiacB;
        });
        
        let html = `<button class="filter-btn active" id="btn-date-ALL" onclick="filterDate('ALL')">Wszystkie Dni</button>`;
        unikalneDaty.forEach(d => {
            const cssId = d.replace('.', '-');
            html += `<button class="filter-btn" id="btn-date-${cssId}" onclick="filterDate('${d}')">${d}</button>`;
        });
        dateContainer.innerHTML = html;
    }

        const container = document.getElementById('matches-container');

        matches.forEach(m => {
            if (currentPhase === 'grupowa' && m.phase !== 'grupowa') return;
            if (currentPhase === 'pucharowa' && m.phase !== 'pucharowa') return;
            if (currentPhase === 'grupowa' && currentGroupFilter !== 'ALL' && m.group !== currentGroupFilter) return;
            if (currentPhase === 'timeline' && currentDateFilter !== 'ALL' && m.date !== currentDateFilter) return;

            const card = document.createElement('div');
            card.className = `match-card ${m.phase === 'pucharowa' ? 'pucharowa' : ''}`;
            const infoGrupa = m.phase === 'grupowa' ? `GRUPA ${m.group}` : m.group;

            let nazwaA = customTeamNames[`nameA_${m.id}`] || m.teamA;
            let nazwaB = customTeamNames[`nameB_${m.id}`] || m.teamB;

            let teamASection = `${nazwaA}`;
            let teamBSection = `${nazwaB}`;

            if (adminMode) {
                teamASection = `<input type="text" id="nameA_in_${m.id}" value="${nazwaA}" onchange="saveLocalInput(${m.id}, 'nameA')">`;
                teamBSection = `<input type="text" id="nameB_in_${m.id}" value="${nazwaB}" onchange="saveLocalInput(${m.id}, 'nameB')">`;
            }

            let oficjalnyWynikA = customTeamNames[`rA_${m.id}`] || "-";
            let oficjalnyWynikB = customTeamNames[`rB_${m.id}`] || "-";

            let sekcjaWyniku = `<span id="rA_${m.id}">${oficjalnyWynikA}</span><span>:</span><span id="rB_${m.id}">${oficjalnyWynikB}</span>`;
            if (adminMode) {
                sekcjaWyniku = `
                    <input type="number" min="0" id="rA_in_${m.id}" value="${oficjalnyWynikA === '-' ? '' : oficjalnyWynikA}" style="width:30px" onchange="saveLocalInput(${m.id}, 'rA')">
                    <span>:</span>
                    <input type="number" min="0" id="rB_in_${m.id}" value="${oficjalnyWynikB === '-' ? '' : oficjalnyWynikB}" style="width:30px" onchange="saveLocalInput(${m.id}, 'rB')">
                `;
            }

            let v1A = customTeamNames[`p1A_${m.id}`] || "";
            let v1B = customTeamNames[`p1B_${m.id}`] || "";
            let v2A = customTeamNames[`p2A_${m.id}`] || "";
            let v2B = customTeamNames[`p2B_${m.id}`] || "";
            let v3A = customTeamNames[`p3A_${m.id}`] || "";
            let v3B = customTeamNames[`p3B_${m.id}`] || "";

            card.innerHTML = `
                <div class="match-header">
                    <span>🏆 ${infoGrupa} (Mecz #${m.id})</span>
                    <span>📅 ${m.date}</span>
                </div>
                <div class="match-main">
                    <div class="team-name team-left">${teamASection}</div>
                    <div class="score-inputs">
                        ${sekcjaWyniku}
                    </div>
                    <div class="team-name team-right">${teamBSection}</div>
                </div>
                <div class="typer-grid">
                    <div class="typer-col">
                        <span class="typer-name">💃 Wiktoria</span>
                        <div class="typer-inputs">
                            <input type="number" min="0" id="p1A_${m.id}" value="${v1A}" onchange="saveLocalInput(${m.id}, 'p1A')"> :
                            <input type="number" min="0" id="p1B_${m.id}" value="${v1B}" onchange="saveLocalInput(${m.id}, 'p1B')">
                        </div>
                        <span class="pts-badge" id="pts1_${m.id}">0 pkt</span>
                    </div>
                    <div class="typer-col">
                        <span class="typer-name">⚽ Janek</span>
                        <div class="typer-inputs">
                            <input type="number" min="0" id="p2A_${m.id}" value="${v2A}" onchange="saveLocalInput(${m.id}, 'p2A')"> :
                            <input type="number" min="0" id="p2B_${m.id}" value="${v2B}" onchange="saveLocalInput(${m.id}, 'p2B')">
                        </div>
                        <span class="pts-badge" id="pts2_${m.id}">0 pkt</span>
                    </div>
                    <div class="typer-col">
                        <span class="typer-name">🔥 Miłosz</span>
                        <div class="typer-inputs">
                            <input type="number" min="0" id="p3A_${m.id}" value="${v3A}" onchange="saveLocalInput(${m.id}, 'p3A')"> :
                            <input type="number" min="0" id="p3B_${m.id}" value="${v3B}" onchange="saveLocalInput(${m.id}, 'p3B')">
                        </div>
                        <span class="pts-badge" id="pts3_${m.id}">0 pkt</span>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
        
        calculatePoints();
    }

    // POPRAWIONE: Bezpieczne pobieranie wartości z okienek bez błędów identyfikatorów
    function saveLocalInput(matchId, prefix) {
        let elA = document.getElementById(`${prefix}_in_${matchId}`) || document.getElementById(`${prefix}_${matchId}`);
        let elB = document.getElementById(`${prefix.slice(0,-1)}B_in_${matchId}`) || document.getElementById(`${prefix.slice(0,-1)}B_${matchId}`);
        
        if (prefix.startsWith('p')) {
            // Bezpieczne pobranie dla okienek typów graczy p1A, p2A itd.
            const userPrefix = prefix.slice(0, 3); // np. 'p1A' lub 'p2A'
            const userPrefixB = userPrefix.slice(0, 2) + 'B'; // np. 'p1B' lub 'p2B'
            const inputA = document.getElementById(`${userPrefix}_${matchId}`);
            const inputB = document.getElementById(`${userPrefixB}_${matchId}`);
            
            if(inputA) customTeamNames[`${userPrefix}_${matchId}`] = inputA.value;
            if(inputB) customTeamNames[`${userPrefixB}_${matchId}`] = inputB.value;
        } else if (prefix === 'nameA' || prefix === 'nameB') {
            const teamInput = document.getElementById(`${prefix}_in_${matchId}`);
            if(teamInput) customTeamNames[`${prefix}_${matchId}`] = teamInput.value;
        } else {
            const rInputA = document.getElementById(`rA_in_${matchId}`);
            const rInputB = document.getElementById(`rB_in_${matchId}`);
            if(rInputA) customTeamNames[`rA_${matchId}`] = rInputA.value;
            if(rInputB) customTeamNames[`rB_${matchId}`] = rInputB.value;
        }
        calculatePoints();
    }

    async function fetchLiveResults() {
        if(!supabaseClient) { alert("Brak połączenia z chmurą!"); return; }
        try {
            const response = await fetch('https://api.football-data.org/v4/competitions/WC/matches', {
                headers: { 'X-Auth-Token': FOOTBALL_API_TOKEN }
            });
            const data = await response.json();
            if(!data || !data.matches || data.matches.length === 0) {
                alert("Połączenie z bazą FIFA aktywne! Brak rozpoczętych meczów. Wyniki pobiorą się automatycznie po rozpoczęciu spotkań.");
                return;
            }
            
            let changed = false;
            for (const apiMatch of data.matches) {
                if(apiMatch.score && apiMatch.score.fullTime && apiMatch.score.fullTime.home !== null) {
                    const homeNameAPI = apiMatch.homeTeam.name.toLowerCase();
                    const matchFound = matches.find(m => m.teamA.toLowerCase().includes(homeNameAPI) || homeNameAPI.includes(m.teamA.toLowerCase()));
                    
                    if(matchFound) {
                        customTeamNames[`rA_${matchFound.id}`] = String(apiMatch.score.fullTime.home);
                        customTeamNames[`rB_${matchFound.id}`] = String(apiMatch.score.fullTime.away);
                        
                        await supabaseClient.from('typer_scores').upsert({ id: `rA_${matchFound.id}`, value: String(apiMatch.score.fullTime.home) });
                        await supabaseClient.from('typer_scores').upsert({ id: `rB_${matchFound.id}`, value: String(apiMatch.score.fullTime.away) });
                        changed = true;
                    }
                }
            }
            
            if(changed) {
                buildMatches();
                alert("Mecze zaktualizowane z FIFA live!");
            } else {
                alert("Baza live podłączona. Brak nowych oficjalnych wyników.");
            }
        } catch (err) {
            console.error(err);
            alert("Serwer FIFA nie odpowiedział. Spróbuj za chwilę.");
        }
    }

    function getPoints(pA, pB, rA, rB) {
        if (pA === "" || pB === "" || rA === "" || rB === "" || rA === "-" || rB === "-") return 0;
        const predA = parseInt(pA), predB = parseInt(pB);
        const realA = parseInt(rA), realB = parseInt(rB);
        
        if (predA === realA && predB === realB) return 3;
        
        const signPred = Math.sign(predA - predB);
        const signReal = Math.sign(realA - realB);
        
        if (signPred === signReal) {
            if (signReal === 0) return 2;
            if ((predA - predB) === (realA - realB)) return 1;
            return 2;
        }
        return 0;
    }

    function calculatePoints() {
        let t1 = 0, t2 = 0, t3 = 0;
        matches.forEach(m => {
            let rA = customTeamNames[`rA_${m.id}`] || "-";
            let rB = customTeamNames[`rB_${m.id}`] || "-";
            
            for (let p = 1; p <= 3; p++) {
                const pA = customTeamNames[`p${p}A_${m.id}`] || "";
                const pB = customTeamNames[`p${p}B_${m.id}`] || "";
                
                const pts = getPoints(pA, pB, rA, rB);
                const b = document.getElementById(`pts${p}_${m.id}`);
                if(b) { 
                    b.innerText = `${pts} pkt`; 
                    b.className = `pts-badge pts-${pts}`; 
                }
                if(p===1) t1+=pts; if(p===2) t2+=pts; if(p===3) t3+=pts;
            }
        });
        document.getElementById('score-p1').innerText = t1;
        document.getElementById('score-p2').innerText = t2;
        document.getElementById('score-p3').innerText = t3;
    }

    async function saveDataToCloud() {
        if(!supabaseClient) { alert("Brak połączenia z chmurą!"); return; }
        
        const rows = [];
        Object.keys(customTeamNames).forEach(key => {
            const val = customTeamNames[key];
            if(val !== undefined && val !== null && String(val).trim() !== "") {
                rows.push({ id: key, value: String(val) });
            }
        });

        if(rows.length === 0) {
            alert("Nie wykryto żadnych nowych danych do wysłania.");
            return;
        }

        try {
            const { error } = await supabaseClient.from('typer_scores').upsert(rows);
            if(error) alert("Błąd chmury Supabase: " + error.message);
            else alert("🎯 Wasze typy i wyniki zostały trwale zapisane w chmurze!");
        } catch (e) {
            console.error(e);
            alert("Błąd połączenia. Spróbuj zapisać typy ponownie.");
        }
    }

    async function loadDataFromCloud() {
        if(!supabaseClient) return;
        try {
            const { data, error } = await supabaseClient.from('typer_scores').select('*');
            if(error) { console.error(error); return; }
            if(!data) return;
            
            customTeamNames = {};
            data.forEach(row => {
                customTeamNames[row.id] = row.value;
            });
            
            buildMatches();
        } catch (e) {
            console.error(e);
        }
    }

    function switchPhase(phase) {
        currentPhase = phase;
        document.querySelectorAll('.nav-tabs .tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-phase-${phase}`).classList.add('active');
        
        document.getElementById('group-filters').style.display = phase === 'grupowa' ? 'flex' : 'none';
        document.getElementById('date-filters').style.display = phase === 'timeline' ? 'flex' : 'none';
        
        buildMatches();
    }

    function filterGroup(group) {
        currentGroupFilter = group;
        document.querySelectorAll('#group-filters .filter-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-group-${group}`).classList.add('active');
        buildMatches();
    }

    function filterDate(date) {
        currentDateFilter = date;
        document.querySelectorAll('#date-filters .filter-btn').forEach(b => b.classList.remove('active'));
        const cssId = date.replace('.', '-');
        document.getElementById(`btn-date-${cssId}`).classList.add('active');
        buildMatches();
    }

    window.addEventListener('DOMContentLoaded', () => {
        try {
            if (window.supabase && typeof window.supabase.createClient === 'function') {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch (err) {
            console.error("Błąd podczas inicjalizacji klienta Supabase:", err);
        }
        buildDateFilters();
        loadDataFromCloud();
    });
</script>
